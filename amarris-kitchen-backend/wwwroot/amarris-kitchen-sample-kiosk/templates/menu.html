<!DOCTYPE html>
<html>

<head>

    <title>Amarri's Kitchen Menu</title>

    <link rel="stylesheet" href="../css/kiosk.css">
    <meta charset="utf-8" />

</head>

<body onload="initMenu(); updateCartCount();">

    <div class="kiosk-container">

        <!-- HEADER -->
        <div class="header">
            🍗 Amarri's Kitchen
        </div>

        <!-- CATEGORY BUTTONS -->
        <div id="categories"></div>

        <!-- PRODUCTS GRID -->
        <div id="products"></div>

        <!-- FLOATING CART -->
        <div class="cart-float" onclick="goCart()">

            🛒 Cart
            (<span id="cartCount">0</span>)

        </div>

    </div>

    <script src="../js/kiosk.js"></script>

    <!--add to cart modal-->
    <div id="productModal" style="display:none; position:fixed; z-index:2000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.85); align-items:center; justify-content:center;">
        <div style="background:white; width:90%; max-width:400px; border-radius:25px; overflow:hidden; position:relative; text-align:center; padding-bottom:20px;">

            <img id="modalImg" src="" style="width:100%; height:250px; object-fit:cover; margin-bottom:15px;">

            <h2 id="modalName" style="margin:0; font-size:28px;">Product Name</h2>
            <p id="modalPrice" style="color:#ff5722; font-size:24px; font-weight:bold; margin:10px 0;">₱0.00</p>

            <div style="display:flex; justify-content:center; align-items:center; gap:20px; margin:20px 0;">
                <button onclick="updateModalQty(-1)" style="width:50px; height:50px; border-radius:15px; border:none; background:#f0f0f0; font-size:24px; font-weight:bold;">-</button>
                <input type="number" id="modalQty" value="1" readonly style="width:60px; text-align:center; font-size:26px; border:none; font-weight:bold;">
                <button onclick="updateModalQty(1)" style="width:50px; height:50px; border-radius:15px; border:none; background:#f0f0f0; font-size:24px; font-weight:bold;">+</button>
            </div>

            <div style="padding:0 20px;">
                <button onclick="confirmAddToCart()" style="width:100%; padding:18px; background:#ff5722; color:white; border:none; border-radius:15px; font-size:20px; font-weight:bold; margin-bottom:10px;">
                    Add to Cart
                </button>
                <button onclick="closeModal()" style="background:none; border:none; color:#888; font-size:18px;">Cancel</button>
            </div>
        </div>
    </div>

</body>



</html>
